<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>moomoo 培训试卷 · 索引</title>
<style>
:root{--bg:#0d0f12;--panel:#16191e;--text:#e8eaed;--muted:#9aa0a6;--brand:#ff6b00;--border:#2a2d33}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.wrap{max-width:760px;width:100%}
h1{font-size:28px;font-weight:700;margin-bottom:8px}
.sub{color:var(--muted);margin-bottom:28px;font-size:14px}
.card{display:block;background:var(--panel);border:1px solid var(--border);border-left:4px solid var(--brand);border-radius:10px;padding:18px 20px;margin-bottom:14px;text-decoration:none;color:var(--text);transition:transform .12s,border-color .12s}
.card:hover{transform:translateX(4px);border-color:var(--brand)}
.tag{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:var(--brand);margin-bottom:6px}
.title{font-size:18px;font-weight:700;margin-bottom:4px}
.desc{font-size:13px;color:var(--muted);line-height:1.5}
.foot{margin-top:24px;font-size:12px;color:var(--muted);text-align:center}
</style>
</head>
<body>
<div class="wrap">
<h1>moomoo 培训试卷</h1>
<p class="sub">三套独立试卷，每套 20 题 / 100 分 / 80 分通过。成绩自动记录在浏览器本地。</p>

<a class="card" href="options.html">
<span class="tag">Exam 1</span>
<div class="title">Options & moomoo Product</div>
<div class="desc">期权基础、moomoo 平台、美股市场、马股市场</div>
</a>

<a class="card" href="advanced.html">
<span class="tag">Exam 2</span>
<div class="title">Advanced Features</div>
<div class="desc">订单种类、换汇操作、股息机制、基金、融资融券</div>
</a>

<a class="card" href="platform.html">
<span class="tag">Exam 3 · Chapters</span>
<div class="title">Platform Features</div>
<div class="desc">5 章节：智能工具、条件单、账户类型、研究工具、特色产品</div>
</a>

<p class="foot">店员培训用 · 内部资料</p>
</div>
</body>
</html>
